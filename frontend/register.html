<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Register | Watch Store Only</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"></head>
<body data-page="register">
  <main class="auth-shell">
    <section class="auth-art"><a href="index.html" class="brand">Watch Store Only</a><h1>Create your collector profile.</h1><p>Build a wishlist, order faster, and get personalized suggestions.</p></section>
    <form id="registerForm" class="glass-card auth-card"><h2>Register</h2><label>Name <input name="name" required></label><label>Email <input name="email" type="email" required></label><label>Mobile <input name="mobile" required></label><label>Password <input name="password" type="password" minlength="6" required></label><button class="btn btn-primary" type="submit">Register</button><p>Already registered? <a href="login.html">Login</a></p></form>
  </main>
  <script src="js/api.js"></script><script src="js/app.js"></script><script src="js/auth.js"></script>
</body>
</html>
