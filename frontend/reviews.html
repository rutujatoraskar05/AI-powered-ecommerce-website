<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Reviews | Watch Store Only</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"></head>
<body data-page="reviews">
  <div id="site-header"></div>
  <main class="page container">
    <div class="page-head"><p class="eyebrow">Community</p><h1>Product reviews</h1></div>
    <section class="split">
      <form id="reviewForm" class="glass-card form-card">
        <label>Product ID <input name="product_id" type="number" min="1" required></label>
        <label>Rating <select name="rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></label>
        <label>Comment <textarea name="comment" rows="5" required></textarea></label>
        <button class="btn btn-primary" type="submit">Add review</button>
      </form>
      <div><label class="inline-search">Load reviews for product <input id="reviewProductId" type="number" min="1" value="1"><button id="loadReviews" class="btn btn-ghost" type="button">Load</button></label><div id="reviewsList" class="stack"></div></div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="js/api.js"></script><script src="js/app.js"></script><script src="js/agent.js"></script><script src="js/products.js"></script>
</body>
</html>
